default_stages: [pre-commit]
# Ensure that the pre-commit can understand syntax
minimum_pre_commit_version: "4.6.0"

repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff lint
        # Using 'uv run' ensure it uses project's locked ruff version
        entry: uv run --project=backend ruff check backend/ --fix
        args: ["--cache-dir=backend/"]
        # args: ["--config=backend/pyproject.toml", "--cache-dir=backend/"]
        language: system
        types_or: [python, pyi]

      - id: ruff-format
        name: ruff format
        entry: uv run --project=backend ruff format backend/ --diff
        args: ["--cache-dir=backend/"]
        # args: ["--config=backend/pyproject.toml", "--cache-dir=backend/"]
        language: system
        types_or: [python, pyi]

      - id: codespell
        name: codespell
        entry: uvx codespell .
        language: system
        # Use pyproject.toml for config
        # additional_dependencies: ["tomli"]
        files: \.md$
        # files: \.(py|md|txt)$
        args: ["--config=backend/pyproject.toml"]

      - id: docker-test
        name: docker-test
        entry: make test
        language: system
        stages: [pre-push]
        pass_filenames: false
