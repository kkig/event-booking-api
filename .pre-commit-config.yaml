default_stages: [pre-commit]
# Ensure that the pre-commit can understand syntax
minimum_pre_commit_version: "4.6.0"

repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff lint
        # Using 'uv run' ensure it uses project's locked ruff version
        entry: cd backend && uv run ruff check . --fix
        language: system
        types_or: [python, pyi]

      - id: ruff-format
        name: ruff format
        entry: cd backend && uv run ruff format . --diff
        language: system
        types_or: [python, pyi]

      - id: docker-test
        name: docker-test
        entry: make test
        language: system
        stages: [pre-push]
        # Don't pass filenames to this hook since it runs tests on the whole codebase
        pass_filenames: false

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        name: codespell
        language: python
        # Use pyproject.toml for config
        additional_dependencies: ["toml"]
        files: \.(py|md|txt)$
