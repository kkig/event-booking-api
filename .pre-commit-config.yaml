repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: uv run black
        language: system
        types: [python]

      - id: isort
        name: isort
        entry: uv run isort
        language: system
        types: [python]

      - id: flake8
        name: flake8
        entry: uv run flake8
        language: system
        types: [python]
        # This points to .flake8 config file
        args: ["--config=.flake8"]

      - id: codespell
        name: codespell
        entry: uv run codespell
        language: system
        types: [python]
        files: \.md$

      - id: docker-test
        name: docker-test
        entry: make test
        language: system
        stages: [pre-push]
        pass_filenames: false

      - id: docker-lint
        name: docker-lint
        entry: make lint
        language: system
        stages: [pre-push]
        pass_filenames: false
