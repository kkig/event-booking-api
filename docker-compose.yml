services:
  web:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
      target: development
    ports:
      - "8000:8000"
    container_name: ticketing_web
    environment:
      - DEBUG
      - SECRET_KEY
      - ALLOWED_HOSTS
      - DJANGO_SETTINGS_MODULE
    volumes:
      # Mount the entire repository root to expose config files.
      - .:/workspace
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: ticketing_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
    ports:
      - "5432:5432"

volumes:
  postgres_data:
